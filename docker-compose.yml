services:
  agent_registry:
    build:
      context: .
      dockerfile: agent_registry/Dockerfile
    ports:
      - "8006:8006"
    environment:
      - REGISTRY_HOST=0.0.0.0
      - REGISTRY_PORT=8006
      - REGISTRY_DB_URL=sqlite:////app/data/registry.db
      - REGISTRY_PROBE_INTERVAL=60
    volumes:
      - registry_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend_agent:
    build: ./frontend_agent
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - HOST=0.0.0.0
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-glm-4.5-air}
      - ARTIFACT_ROOT=/workspace/artifacts
    volumes:
      - frontend_workspace:/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/.well-known/agent-card.json"]
      interval: 10s
      timeout: 5s
      retries: 5

  main_agent:
    build:
      context: .
      dockerfile: main_agent/Dockerfile
    ports:
      - "8080:8080"    # adk web UI + artifact serving
      - "8081:8081"    # A2A server (called by eino_agent)
    environment:
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-glm-4.5-air}
      # Internal service discovery via compose DNS.
      - FRONTEND_AGENT_URL=http://frontend_agent:8001
      - BACKEND_AGENT_URL=http://mock_agent:8002
      - COMEDIAN_AGENT_URL=http://comedian:8003
      - CRITIC_AGENT_URL=http://critic:8004
      - EINO_AGENT_URL=http://eino_agent:8005
      - AGENT_REGISTRY_URL=http://agent_registry:8006
      - MCP_SERVERS=[{"transport":"stdio","command":"python","args":["/app/tools/weather_mcp.py"],"name":"weather"},{"transport":"sse","url":"http://agent_registry:8006/sse","name":"registry","tool_name_prefix":"reg"}]
      - FILE_SERVER_PORT=8080
      - MAIN_AGENT_A2A_PORT=8081
      - SERVICE_NAME=main_agent
      - SESSIONS_DB_PATH=/app/data/sessions.db
      - ADK_WEB=true
    volumes:
      - main_agent_artifacts:/app/artifacts
      - main_agent_sessions:/app/data
    command: ["bash", "./main_agent/entrypoint.sh"]
    depends_on:
      agent_registry:
        condition: service_healthy
      frontend_agent:
        condition: service_healthy
      mock_agent:
        condition: service_healthy
      eino_agent:
        condition: service_healthy

  mock_agent:
    build:
      context: .
      dockerfile: mock_agent/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - MOCK_AGENT_HOST=0.0.0.0
      - MOCK_AGENT_PORT=8002
      - SERVICE_NAME=mock_agent
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-glm-4.5-air}
    volumes:
      - mock_agent_artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/.well-known/agent-card.json"]
      interval: 10s
      timeout: 5s
      retries: 5

  comedian:
    build:
      context: .
      dockerfile: demo_agents/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - COMEDIAN_HOST=0.0.0.0
      - COMEDIAN_PORT=8003
      - SERVICE_NAME=comedian
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-glm-4.5-air}
    volumes:
      - comedian_artifacts:/app/artifacts
    command: ["python", "comedian_server.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/.well-known/agent-card.json"]
      interval: 10s
      timeout: 5s
      retries: 5

  critic:
    build:
      context: .
      dockerfile: demo_agents/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - CRITIC_HOST=0.0.0.0
      - CRITIC_PORT=8004
      - SERVICE_NAME=critic
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-glm-4.5-air}
    volumes:
      - critic_artifacts:/app/artifacts
    command: ["python", "critic_server.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/.well-known/agent-card.json"]
      interval: 10s
      timeout: 5s
      retries: 5

  eino_agent:
    build: ./eino_agent
    ports:
      - "8005:8005"
    environment:
      - EINO_AGENT_HOST=0.0.0.0
      - EINO_AGENT_PORT=8005
      - SERVICE_NAME=eino_agent
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-glm-4.5-air}
      - AGENT_REGISTRY_URL=http://agent_registry:8006
    depends_on:
      agent_registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/.well-known/agent-card.json"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  registry_data:
  frontend_workspace:
  main_agent_artifacts:
  main_agent_sessions:
  mock_agent_artifacts:
  comedian_artifacts:
  critic_artifacts:
